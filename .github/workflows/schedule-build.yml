name: Daily Build (Scheduled)

on:
  push:
    paths:
      - '.github/workflows/schedule-build.yml'
  schedule:
    # 毎日 UTC 08:15 (日本時間 17:15) に実行
    - cron: '15 8 * * *'
  # 手動実行用 (テストなどのため)
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for MyFXbook
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Fetch MyFXbook data
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
          MYFXBOOK_ACCOUNT_ID: ${{ secrets.MYFXBOOK_ACCOUNT_ID }}
        run: python .github/scripts/fetch_myfxbook.py

      - name: Commit and push MyFXbook data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/myfxbook-data.json
          git diff --cached --quiet || git commit -m "chore: update myfxbook data [skip ci]"
          git push

      - name: Trigger Cloudflare Pages Deploy Hook
        # Settings > Secrets and variables > Actions で
        # 登録した `CF_PAGES_DEPLOY_HOOK_URL` にリクエストを投げる
        run: |
          if [ -z "${{ secrets.CF_PAGES_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: CF_PAGES_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -X POST "${{ secrets.CF_PAGES_DEPLOY_HOOK_URL }}"

      - name: Wait for Cloudflare Pages build to finish
        run: sleep 180

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install atproto Pillow

      - name: Auto Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python .github/scripts/auto_bsky.py
