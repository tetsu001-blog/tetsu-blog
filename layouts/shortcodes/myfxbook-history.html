<style>
.myfx-history-wrap { max-width: 720px; margin: 1.5rem auto 2rem; font-family: sans-serif; }
.myfx-history-wrap h4 { font-size: 1rem; color: #444; margin: 0 0 0.8rem; }

.myfx-history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.myfx-history-table th {
  background: #f5f5f5;
  color: #555;
  font-weight: 600;
  padding: 0.5rem 0.6rem;
  text-align: center;
  border-bottom: 2px solid #ddd;
  white-space: nowrap;
}
.myfx-history-table td {
  padding: 0.45rem 0.6rem;
  text-align: center;
  border-bottom: 1px solid #eee;
}
.myfx-history-table tr:hover td { background: #fafafa; }
.myfx-buy  { color: #1a7f3c; font-weight: bold; }
.myfx-sell { color: #c0392b; font-weight: bold; }
.myfx-pos  { color: #1a7f3c; }
.myfx-neg  { color: #c0392b; }

/* 入出金行 */
.myfx-deposit td   { background: #eaf4ff; }
.myfx-withdraw td  { background: #fff0f0; }
.myfx-deposit td,
.myfx-withdraw td  { font-style: italic; }
.myfx-deposit-label  { color: #1565c0; font-weight: bold; }
.myfx-withdraw-label { color: #c0392b; font-weight: bold; }

.myfx-history-loading { color: #999; font-size: 0.9rem; }

.myfx-pager {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  margin-top: 1rem;
  font-size: 0.9rem;
}
.myfx-pager button {
  padding: 0.35rem 1rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  font-size: 0.85rem;
}
.myfx-pager button:disabled {
  opacity: 0.4;
  cursor: default;
}
.myfx-pager button:not(:disabled):hover {
  background: #f0f0f0;
}
.myfx-pager-info { color: #666; }
</style>

<div class="myfx-history-wrap">
  <h4>取引履歴</h4>
  <p class="myfx-history-loading" id="myfx-history-loading">読み込み中...</p>
  <div style="overflow-x:auto;">
    <table class="myfx-history-table" id="myfx-history-table" style="display:none;">
      <thead>
        <tr>
          <th id="myfx-sort-toggle" style="cursor:pointer; user-select:none;">決済日時 (JST) <span id="myfx-sort-icon">▼</span></th>
          <th>通貨ペア</th>
          <th>売買</th>
          <th>ロット</th>
          <th>開始値</th>
          <th>決済値</th>
          <th>Pips</th>
          <th>損益</th>
        </tr>
      </thead>
      <tbody id="myfx-history-body"></tbody>
    </table>
    <div class="myfx-pager" id="myfx-pager" style="display:none;">
      <button id="myfx-prev">← 前へ</button>
      <span class="myfx-pager-info" id="myfx-pager-info"></span>
      <button id="myfx-next">次へ →</button>
    </div>
  </div>
</div>

<script>
// MyFXbook の時刻文字列 "MM/DD/YYYY HH:MM" をJST（UTC+9）に変換
function toJST(timeStr) {
  if (!timeStr || timeStr === '--') return '--';
  // "03/27/2026 07:25" → Date として解釈（UTC扱い）
  const [datePart, timePart] = timeStr.split(' ');
  if (!datePart) return timeStr;
  const [month, day, year] = datePart.split('/');
  const [hour, min] = (timePart || '00:00').split(':');
  const utc = new Date(Date.UTC(year, month - 1, day, hour, min));
  const jst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${jst.getUTCFullYear()}/${pad(jst.getUTCMonth()+1)}/${pad(jst.getUTCDate())} ${pad(jst.getUTCHours())}:${pad(jst.getUTCMinutes())}`;
}

(async function() {
  try {
    const [histRes, sumRes] = await Promise.all([
      fetch('/data/myfxbook-history.json'),
      fetch('/data/myfxbook-summary.json')
    ]);
    const data = await histRes.json();
    const sum  = await sumRes.json();

    document.getElementById('myfx-history-loading').style.display = 'none';
    if (!data || data.length === 0) return;

    const PER_PAGE = 25;
    const tbody = document.getElementById('myfx-history-body');

    const tradesDesc = [...data];
    let trades = [...tradesDesc];
    let sortDesc = true; // true=新→古, false=古→新

    function buildRow(t) {
      const profit = parseFloat(t.profit);
      const pips   = parseFloat(t.pips);
      const isBuy  = (t.action || '').toLowerCase() === 'buy';
      const symbol = t.symbol || '';

      const isDeposit  = (!symbol || symbol === '--') && profit > 0;
      const isWithdraw = (!symbol || symbol === '--') && profit < 0;
      const isFunding  = isDeposit || isWithdraw;

      const tr = document.createElement('tr');
      if (isDeposit)  tr.className = 'myfx-deposit';
      if (isWithdraw) tr.className = 'myfx-withdraw';

      if (isFunding) {
        tr.innerHTML = `
          <td>${toJST(t.closeTime)}</td>
          <td colspan="6" class="${isDeposit ? 'myfx-deposit-label' : 'myfx-withdraw-label'}">
            ${isDeposit ? '入金' : '出金'}
          </td>
          <td class="${profit >= 0 ? 'myfx-pos' : 'myfx-neg'}">${profit >= 0 ? '+' : ''}${profit.toFixed(0)}</td>
        `;
      } else {
        tr.innerHTML = `
          <td>${toJST(t.closeTime)}</td>
          <td><strong>${symbol || '--'}</strong></td>
          <td class="${isBuy ? 'myfx-buy' : 'myfx-sell'}">${isBuy ? '買' : '売'}</td>
          <td>${parseFloat(t.sizing?.value ?? t.sizing ?? 0).toFixed(2)}</td>
          <td>${t.openPrice || '--'}</td>
          <td>${t.closePrice || '--'}</td>
          <td class="${pips >= 0 ? 'myfx-pos' : 'myfx-neg'}">${pips >= 0 ? '+' : ''}${pips.toFixed(1)}</td>
          <td class="${profit >= 0 ? 'myfx-pos' : 'myfx-neg'}">${profit >= 0 ? '+' : ''}${profit.toFixed(2)}</td>
        `;
      }
      return tr;
    }

    let totalPages = Math.ceil(trades.length / PER_PAGE);
    let currentPage = 1;

    function renderPage(page) {
      currentPage = page;
      totalPages = Math.ceil(trades.length / PER_PAGE);
      tbody.innerHTML = '';
      const start = (page - 1) * PER_PAGE;
      const end = Math.min(start + PER_PAGE, trades.length);
      for (let i = start; i < end; i++) {
        tbody.appendChild(buildRow(trades[i]));
      }

      // ページャー表示（2ページ以上ある場合のみ）
      const pager = document.getElementById('myfx-pager');
      if (totalPages > 1) {
        pager.style.display = '';
        document.getElementById('myfx-pager-info').textContent = `${page} / ${totalPages} ページ`;
        document.getElementById('myfx-prev').disabled = (page <= 1);
        document.getElementById('myfx-next').disabled = (page >= totalPages);
      } else {
        pager.style.display = 'none';
      }
    }

    // 並び順切り替え
    document.getElementById('myfx-sort-toggle').addEventListener('click', () => {
      sortDesc = !sortDesc;
      if (sortDesc) {
        trades = [...tradesDesc];
      } else {
        trades = [...tradesDesc].reverse();
      }
      document.getElementById('myfx-sort-icon').textContent = sortDesc ? '▼' : '▲';
      renderPage(1);
    });

    document.getElementById('myfx-prev').addEventListener('click', () => {
      if (currentPage > 1) renderPage(currentPage - 1);
    });
    document.getElementById('myfx-next').addEventListener('click', () => {
      if (currentPage < totalPages) renderPage(currentPage + 1);
    });

    renderPage(1);
    document.getElementById('myfx-history-table').style.display = '';
  } catch(e) {
    document.getElementById('myfx-history-loading').textContent = 'データを取得できませんでした';
    console.error('取引履歴読み込みエラー:', e);
  }
})();
</script>
