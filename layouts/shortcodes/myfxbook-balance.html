<style>
.myfx-balance-wrap { max-width: 720px; margin: 1rem auto 2rem; font-family: sans-serif; }
.myfx-balance-wrap h4 {
  font-size: 1rem;
  color: #444;
  margin: 0 0 0.8rem;
}
</style>

<div class="myfx-balance-wrap">
  <h4>口座残高の推移</h4>
  <canvas id="myfxBalanceChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    const [sumRes, dataRes, histRes] = await Promise.all([
      fetch('/data/myfxbook-summary.json'),
      fetch('/data/myfxbook-data.json'),
      fetch('/data/myfxbook-history.json')
    ]);
    const sum     = await sumRes.json();
    const rawData = await dataRes.json();
    const history = await histRes.json();

    const currentBalance = parseFloat(sum.balance);
    const currency       = sum.currency || 'JPY';

    // daily gain データをフラット化（各要素が配列の配列になっている）
    const data = rawData.map(d => Array.isArray(d) ? d[0] : d).filter(Boolean);
    if (!data.length) return;

    // --- 入出金マップ（日付→金額）を取引履歴から作成 ---
    const depositMap = new Map();   // date -> total deposits
    const withdrawMap = new Map();  // date -> total withdrawals
    if (history && history.length > 0) {
      history.forEach(t => {
        const action = (t.action || '').toLowerCase();
        const symbol = t.symbol || '';
        const profit = parseFloat(t.profit) || 0;
        const isDeposit  = (action === 'deposit')  || (!symbol || symbol === '--') && profit > 0;
        const isWithdraw = (action === 'withdrawal') || (!symbol || symbol === '--') && profit < 0;
        if (!isDeposit && !isWithdraw) return;
        const dateStr = (t.closeTime || '').split(' ')[0];
        if (!dateStr) return;
        if (isDeposit) {
          depositMap.set(dateStr, (depositMap.get(dateStr) || 0) + profit);
        } else {
          withdrawMap.set(dateStr, (withdrawMap.get(dateStr) || 0) + Math.abs(profit));
        }
      });
    }

    // --- 直近入金日を取得（フィルター用） ---
    let depositDate = null;
    if (history && history.length > 0) {
      const deposit = history.find(t => (t.action || '').toLowerCase() === 'deposit');
      if (deposit) {
        const ds = (deposit.closeTime || '').split(' ')[0];
        const [m, d, y] = ds.split('/');
        if (y) depositDate = new Date(y, m - 1, d);
      }
    }

    function parseFlexDate(str) {
      if (!str) return null;
      const parts = str.split('/');
      if (parts.length === 3 && parts[2] && parts[2].length === 4) {
        return new Date(parts[2], parts[0] - 1, parts[1]);
      }
      return new Date(str);
    }

    // 入金日以降のみにフィルター
    const filteredData = depositDate
      ? data.filter(d => {
          const dd = parseFlexDate(d.date);
          return dd && dd >= depositDate;
        })
      : data;

    if (!filteredData.length) return;

    // --- sum.balance から逆算して各日の終了時残高を計算 ---
    // 新しい日 → 古い日の順で処理
    const labels = [];
    const balanceValues = [];
    let bal = currentBalance;

    const reversed = [...filteredData].reverse();
    reversed.forEach(d => {
      labels.unshift(d.date);
      balanceValues.unshift(Math.round(bal));
      // 当日の取引損益を引く
      const profit = parseFloat(d.profit);
      if (!isNaN(profit)) {
        bal -= profit;
      }
      // 当日の入出金を調整（入金分を引く、出金分を足す）
      const dep = depositMap.get(d.date) || 0;
      const wd  = withdrawMap.get(d.date) || 0;
      bal -= dep;
      bal += wd;
    });

    // --- 入出金ポイントのマーカー ---
    const depositPoints = [];
    const withdrawPoints = [];
    labels.forEach((date, i) => {
      depositPoints.push(depositMap.has(date) ? balanceValues[i] : null);
      withdrawPoints.push(withdrawMap.has(date) ? balanceValues[i] : null);
    });

    const hasDeposits  = depositPoints.some(v => v !== null);
    const hasWithdraws = withdrawPoints.some(v => v !== null);

    const datasets = [
      {
        label: '口座残高',
        data: balanceValues,
        borderColor: '#6b8e23',
        backgroundColor: 'rgba(107, 142, 35, 0.12)',
        borderWidth: 2,
        pointRadius: 2,
        fill: true,
        tension: 0.3
      }
    ];

    if (hasDeposits) {
      datasets.push({
        label: '入金',
        data: depositPoints,
        borderColor: '#e67e22',
        backgroundColor: '#e67e22',
        borderWidth: 0,
        pointRadius: 6,
        pointStyle: 'circle',
        showLine: false
      });
    }
    if (hasWithdraws) {
      datasets.push({
        label: '出金',
        data: withdrawPoints,
        borderColor: '#3498db',
        backgroundColor: '#3498db',
        borderWidth: 0,
        pointRadius: 6,
        pointStyle: 'circle',
        showLine: false
      });
    }

    const chartEl = document.getElementById('myfxBalanceChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: function(context) {
                const val = context.parsed.y;
                if (val === null) return null;
                return ` ${val.toLocaleString()} ${currency}`;
              }
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: { ticks: { callback: val => val.toLocaleString() } }
        }
      }
    });
  } catch(e) {
    console.error('残高グラフ読み込みエラー:', e);
  }
})();
</script>
