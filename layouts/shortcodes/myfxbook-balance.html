<style>
.myfx-balance-wrap { max-width: 720px; margin: 1rem auto 2rem; font-family: sans-serif; }
.myfx-balance-wrap h4 {
  font-size: 1rem;
  color: #444;
  margin: 0 0 0.8rem;
}
</style>

<div class="myfx-balance-wrap">
  <h4>口座残高の推移</h4>
  <canvas id="myfxBalanceChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    const [sumRes, dataRes] = await Promise.all([
      fetch('/data/myfxbook-summary.json'),
      fetch('/data/myfxbook-data.json')
    ]);
    const sum  = await sumRes.json();
    const data = await dataRes.json();

    const currentBalance = parseFloat(sum.balance);
    const currency       = sum.currency || 'JPY';

    const labels   = [];
    const balances = [];

    if (data && data.length > 0) {
      // Daily Gain APIデータから逆算
      let balance = currentBalance;
      const reversed = [...data].reverse();
      reversed.forEach(d => {
        labels.unshift(d.date);
        balances.unshift(parseFloat(balance.toFixed(0)));
        const profit = parseFloat(d.profit);
        if (!isNaN(profit)) {
          balance -= profit;
        } else {
          balance = balance / (1 + parseFloat(d.gain) / 100);
        }
      });
    } else {
      // フォールバック: 取引履歴から残高推移を算出
      const histRes = await fetch('/data/myfxbook-history.json');
      const history = await histRes.json();
      if (!history || history.length === 0) return;

      const sorted = [...history].reverse();
      let runningBalance = 0;
      const dailyMap = new Map();

      sorted.forEach(t => {
        const profit = parseFloat(t.profit) || 0;
        runningBalance += profit;
        const dateStr = (t.closeTime || '').split(' ')[0];
        if (dateStr) {
          dailyMap.set(dateStr, Math.round(runningBalance));
        }
      });

      dailyMap.forEach((val, key) => {
        labels.push(key);
        balances.push(val);
      });
    }

    if (labels.length === 0) return;

    const chartEl = document.getElementById('myfxBalanceChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: `口座残高 (${currency})`,
          data: balances,
          borderColor: '#1a7f3c',
          backgroundColor: 'rgba(26, 127, 60, 0.1)',
          borderWidth: 2,
          pointRadius: 2,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toLocaleString()} ${currency}`
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: { ticks: { callback: val => val.toLocaleString() } }
        }
      }
    });
  } catch(e) {
    console.error('残高グラフ読み込みエラー:', e);
  }
})();
</script>
