<style>
.myfx-balance-wrap { max-width: 720px; margin: 1rem auto 2rem; font-family: sans-serif; }
.myfx-balance-wrap h4 {
  font-size: 1rem;
  color: #444;
  margin: 0 0 0.8rem;
}
</style>

<div class="myfx-balance-wrap">
  <h4>口座残高の推移</h4>
  <canvas id="myfxBalanceChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    const res = await fetch('/data/myfxbook-daily-balance.json');
    const rawData = await res.json();

    if (!rawData || rawData.length === 0) return;

    // APIレスポンスが [[{...}], [{...}]] の入れ子配列のためフラット化
    const data = rawData.map(d => Array.isArray(d) ? d[0] : d).filter(Boolean);
    if (!data.length) return;

    const labels = [];
    const balanceValues = [];

    data.forEach(d => {
      labels.push(d.date);
      balanceValues.push(Math.round(parseFloat(d.balance)));
    });

    const chartEl = document.getElementById('myfxBalanceChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '口座残高',
          data: balanceValues,
          borderColor: '#6b8e23',
          backgroundColor: 'rgba(107, 142, 35, 0.12)',
          borderWidth: 2,
          pointRadius: 3,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toLocaleString()} JPY`
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: { ticks: { callback: val => val.toLocaleString() } }
        }
      }
    });
  } catch(e) {
    console.error('残高グラフ読み込みエラー:', e);
  }
})();
</script>
