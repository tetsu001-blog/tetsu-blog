<style>
.myfx-balance-wrap { max-width: 720px; margin: 1rem auto 2rem; font-family: sans-serif; }
.myfx-balance-wrap h4 {
  font-size: 1rem;
  color: #444;
  margin: 0 0 0.8rem;
}
</style>

<div class="myfx-balance-wrap">
  <h4>口座残高の推移</h4>
  <canvas id="myfxBalanceChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    const [sumRes, dataRes, histRes] = await Promise.all([
      fetch('/data/myfxbook-summary.json'),
      fetch('/data/myfxbook-data.json'),
      fetch('/data/myfxbook-history.json')
    ]);
    const sum     = await sumRes.json();
    const data    = await dataRes.json();
    const history = await histRes.json();

    const currentBalance = parseFloat(sum.balance);
    const currency       = sum.currency || 'JPY';

    // --- 直近入金日を取得 ---
    let depositDate = null;
    if (history && history.length > 0) {
      const deposit = history.find(t => (t.action || '').toLowerCase() === 'deposit');
      if (deposit) {
        const ds = (deposit.closeTime || '').split(' ')[0];
        const [m, d, y] = ds.split('/');
        if (y) depositDate = new Date(y, m - 1, d);
      }
    }

    function parseFlexDate(str) {
      if (!str) return null;
      const parts = str.split('/');
      if (parts.length === 3 && parts[2] && parts[2].length === 4) {
        return new Date(parts[2], parts[0] - 1, parts[1]);
      }
      return new Date(str);
    }

    // --- 有効証拠金（Equity）: Daily Gainデータから逆算（入金日以降のみ） ---
    const equityLabels = [];
    const equityValues = [];

    if (data && data.length > 0) {
      const filteredData = depositDate
        ? data.filter(d => {
            const dd = parseFlexDate(d.date);
            return dd && dd >= depositDate;
          })
        : data;

      let balance = currentBalance;
      const reversed = [...filteredData].reverse();
      reversed.forEach(d => {
        equityLabels.unshift(d.date);
        equityValues.unshift(parseFloat(balance.toFixed(0)));
        const profit = parseFloat(d.profit);
        if (!isNaN(profit)) {
          balance -= profit;
        } else {
          balance = balance / (1 + parseFloat(d.gain) / 100);
        }
      });
    }

    // --- 口座残高（Balance）: 取引履歴から算出（直近入金以降のみ） ---
    const balanceMap = new Map();

    if (history && history.length > 0) {
      const sorted = [...history].reverse(); // oldest first

      // 直近入金のインデックスを探す
      let lastDepositIdx = -1;
      sorted.forEach((t, i) => {
        if ((t.action || '').toLowerCase() === 'deposit') lastDepositIdx = i;
      });
      const filtered = lastDepositIdx >= 0 ? sorted.slice(lastDepositIdx) : sorted;

      let runningBalance = 0;
      filtered.forEach(t => {
        const profit = parseFloat(t.profit) || 0;
        runningBalance += profit;
        const dateStr = (t.closeTime || '').split(' ')[0];
        if (dateStr) {
          balanceMap.set(dateStr, Math.round(runningBalance));
        }
      });
    }

    // --- 共通の日付ラベルを作成 ---
    let labels = [];
    if (equityLabels.length > 0) {
      labels = equityLabels;
    } else if (balanceMap.size > 0) {
      labels = Array.from(balanceMap.keys());
    } else {
      return;
    }

    // 口座残高を共通ラベルに合わせる
    const balanceValues = [];
    let lastBalance = null;
    labels.forEach(date => {
      if (balanceMap.has(date)) {
        lastBalance = balanceMap.get(date);
      }
      balanceValues.push(lastBalance);
    });

    // 有効証拠金データがない場合は口座残高のみ表示
    const hasEquity  = equityValues.length > 0;
    const hasBalance = balanceValues.some(v => v !== null);

    const datasets = [];
    if (hasBalance) {
      datasets.push({
        label: `口座残高 (${currency})`,
        data: balanceValues,
        borderColor: '#1a7f3c',
        backgroundColor: 'rgba(26, 127, 60, 0.1)',
        borderWidth: 2,
        pointRadius: 2,
        fill: true,
        tension: 0.3
      });
    }
    if (hasEquity) {
      datasets.push({
        label: `有効証拠金 (${currency})`,
        data: equityValues,
        borderColor: '#e67e22',
        backgroundColor: 'rgba(230, 126, 34, 0.05)',
        borderWidth: 2,
        pointRadius: 2,
        fill: false,
        tension: 0.3,
        borderDash: [5, 3]
      });
    }

    if (datasets.length === 0) return;

    const chartEl = document.getElementById('myfxBalanceChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toLocaleString()} ${currency}`
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: { ticks: { callback: val => val.toLocaleString() } }
        }
      }
    });
  } catch(e) {
    console.error('残高グラフ読み込みエラー:', e);
  }
})();
</script>
