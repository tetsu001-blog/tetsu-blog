<style>
.myfx-wrap { max-width: 720px; margin: 2rem auto; font-family: sans-serif; }

.myfx-card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 1.2rem 1.8rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.myfx-card h3 {
  margin: 0 0 1rem;
  font-size: 1.1rem;
  text-align: center;
  color: #333;
  border-bottom: 1px solid #eee;
  padding-bottom: 0.6rem;
}
.myfx-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem 1.5rem;
}
.myfx-stat { display: flex; justify-content: space-between; align-items: center; }
.myfx-stat .label { color: #666; font-size: 0.9rem; }
.myfx-stat .value { font-weight: bold; font-size: 1rem; color: #222; }
.myfx-stat .value.positive { color: #1a7f3c; }
.myfx-stat .value.negative { color: #c0392b; }

.myfx-verified {
  text-align: center;
  font-size: 0.75rem;
  color: #999;
  margin-top: 0.8rem;
}
</style>

<div class="myfx-wrap">
  <div class="myfx-card">
    <h3 id="myfx-name">てつFX</h3>
    <div class="myfx-stats">
      <div class="myfx-stat">
        <span class="label">口座残高</span>
        <span class="value" id="myfx-balance">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">成長率</span>
        <span class="value" id="myfx-growth">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">最大DD</span>
        <span class="value" id="myfx-drawdown">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">月次損益</span>
        <span class="value" id="myfx-monthly">--</span>
      </div>
    </div>
    <div class="myfx-verified">VERIFIED BY MYFXBOOK.COM</div>
  </div>

  <canvas id="myfxbookChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    // サマリー表示
    const sumRes = await fetch('/data/myfxbook-summary.json');
    const sum = await sumRes.json();

    document.getElementById('myfx-name').textContent = 'てつFX';
    document.getElementById('myfx-balance').textContent =
      Number(sum.balance).toLocaleString() + ' ' + (sum.currency || 'USD');

    function pct(val) {
      const n = parseFloat(val);
      const el_id = arguments[1];
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    const growthEl = document.getElementById('myfx-growth');
    const g = parseFloat(sum.growth);
    growthEl.textContent = (g >= 0 ? '+' : '') + g.toFixed(2) + '%';
    growthEl.classList.add(g >= 0 ? 'positive' : 'negative');

    const ddEl = document.getElementById('myfx-drawdown');
    ddEl.textContent = parseFloat(sum.drawdown).toFixed(2) + '%';
    ddEl.classList.add('negative');

    const moEl = document.getElementById('myfx-monthly');
    const mo = parseFloat(sum.monthly);
    moEl.textContent = (mo >= 0 ? '+' : '') + mo.toFixed(2) + '%';
    moEl.classList.add(mo >= 0 ? 'positive' : 'negative');

  } catch(e) {
    console.error('サマリー読み込みエラー:', e);
  }

  try {
    // グラフ描画（口座残高 + 累積損益率の統合チャート）
    const [res, histRes2, sumRes2] = await Promise.all([
      fetch('/data/myfxbook-data.json'),
      fetch('/data/myfxbook-history.json'),
      fetch('/data/myfxbook-summary.json')
    ]);
    const data    = await res.json();
    const history = await histRes2.json();
    const sum2    = await sumRes2.json();
    const currency = sum2.currency || 'JPY';

    // --- 直近入金日を取得 ---
    let depositDate = null;
    if (history && history.length > 0) {
      const deposit = history.find(t => (t.action || '').toLowerCase() === 'deposit');
      if (deposit) {
        const ds = (deposit.closeTime || '').split(' ')[0];
        const [m, d, y] = ds.split('/');
        if (y) depositDate = new Date(y, m - 1, d);
      }
    }

    function parseFlexDate(str) {
      if (!str) return null;
      const parts = str.split('/');
      if (parts.length === 3 && parts[2] && parts[2].length === 4) {
        return new Date(parts[2], parts[0] - 1, parts[1]);
      }
      return new Date(str);
    }

    // === 累積損益率 ===
    const labels = [];
    const gains  = [];

    if (data && data.length > 0) {
      let cumulative = 0;
      data.forEach(d => {
        if (depositDate) {
          const dd = parseFlexDate(d.date);
          if (dd && dd < depositDate) return;
        }
        cumulative += d.gain;
        labels.push(d.date);
        gains.push(parseFloat(cumulative.toFixed(2)));
      });
    } else if (history && history.length > 0) {
      const sorted = [...history].reverse();
      let lastDepositIdx = -1;
      sorted.forEach((t, i) => {
        if ((t.action || '').toLowerCase() === 'deposit') lastDepositIdx = i;
      });
      const filtered = lastDepositIdx >= 0 ? sorted.slice(lastDepositIdx) : sorted;

      let totalDeposits = 0;
      let cumulativeProfit = 0;
      const dailyMap = new Map();

      filtered.forEach(t => {
        const profit = parseFloat(t.profit) || 0;
        const action = (t.action || '').toLowerCase();
        if (action === 'deposit') {
          totalDeposits += profit;
        } else if (action !== 'withdrawal' && totalDeposits > 0) {
          cumulativeProfit += profit;
        }
        if (totalDeposits > 0) {
          const dateStr = (t.closeTime || '').split(' ')[0];
          if (dateStr) {
            dailyMap.set(dateStr, parseFloat(((cumulativeProfit / totalDeposits) * 100).toFixed(2)));
          }
        }
      });

      dailyMap.forEach((val, key) => {
        labels.push(key);
        gains.push(val);
      });
    }

    if (labels.length === 0) return;

    // === 口座残高 ===
    const balanceMap = new Map();
    if (history && history.length > 0) {
      const sorted = [...history].reverse();
      let lastDepositIdx = -1;
      sorted.forEach((t, i) => {
        if ((t.action || '').toLowerCase() === 'deposit') lastDepositIdx = i;
      });
      const filtered = lastDepositIdx >= 0 ? sorted.slice(lastDepositIdx) : sorted;

      let runningBalance = 0;
      filtered.forEach(t => {
        const profit = parseFloat(t.profit) || 0;
        runningBalance += profit;
        const dateStr = (t.closeTime || '').split(' ')[0];
        if (dateStr) {
          balanceMap.set(dateStr, Math.round(runningBalance));
        }
      });
    }

    const balanceValues = [];
    let lastBalance = null;
    labels.forEach(date => {
      if (balanceMap.has(date)) {
        lastBalance = balanceMap.get(date);
      }
      balanceValues.push(lastBalance);
    });

    // === 統合チャート描画 ===
    const chartEl = document.getElementById('myfxbookChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: `口座残高 (${currency})`,
            data: balanceValues,
            borderColor: '#1a7f3c',
            backgroundColor: 'rgba(26, 127, 60, 0.1)',
            borderWidth: 2,
            pointRadius: 3,
            fill: true,
            tension: 0.3,
            yAxisID: 'y'
          },
          {
            label: '累積損益率 (%)',
            data: gains,
            borderColor: '#0024ff',
            backgroundColor: 'rgba(0, 36, 255, 0.05)',
            borderWidth: 2,
            pointRadius: 3,
            fill: false,
            tension: 0.3,
            borderDash: [5, 3],
            yAxisID: 'y1'
          }
        ]
      },
      options: {
        responsive: true,
        interaction: {
          mode: 'index',
          intersect: false
        },
        plugins: {
          legend: { display: true },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: {
              label: function(ctx) {
                if (ctx.dataset.yAxisID === 'y') {
                  return ` 口座残高: ${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '--'} ${currency}`;
                } else {
                  return ` 累積損益率: ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : '--'}%`;
                }
              }
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: {
            type: 'linear',
            position: 'left',
            ticks: { callback: val => val.toLocaleString() }
          },
          y1: {
            type: 'linear',
            position: 'right',
            ticks: { callback: val => val + '%' },
            grid: { drawOnChartArea: false }
          }
        }
      }
    });
  } catch(e) {
    console.error('グラフ読み込みエラー:', e);
  }
})();
</script>
