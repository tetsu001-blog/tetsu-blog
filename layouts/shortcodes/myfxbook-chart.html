<style>
.myfx-wrap { max-width: 720px; margin: 2rem auto; font-family: sans-serif; }

.myfx-card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 1.2rem 1.8rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.myfx-card h3 {
  margin: 0 0 1rem;
  font-size: 1.1rem;
  text-align: center;
  color: #333;
  border-bottom: 1px solid #eee;
  padding-bottom: 0.6rem;
}
.myfx-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem 1.5rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid #eee;
}
.myfx-section:last-of-type { border-bottom: none; }
.myfx-stat { display: flex; justify-content: space-between; align-items: center; }
.myfx-stat .label { color: #666; font-size: 0.85rem; }
.myfx-stat .value { font-weight: bold; font-size: 0.95rem; color: #222; }
.myfx-stat .value.positive { color: #1a7f3c; }
.myfx-stat .value.negative { color: #c0392b; }

.myfx-verified {
  text-align: center;
  font-size: 0.75rem;
  color: #999;
  margin-top: 0.8rem;
}
</style>

<div class="myfx-wrap">
  <div class="myfx-card">
    <h3 id="myfx-name">てつFX</h3>

    <!-- セクション1: 増加 -->
    <div class="myfx-section">
      <div class="myfx-stat">
        <span class="label">増加</span>
        <span class="value" id="myfx-growth">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">増加平均</span>
        <span class="value" id="myfx-abs-gain">--</span>
      </div>
    </div>

    <!-- セクション2: 日々・月々・DD -->
    <div class="myfx-section">
      <div class="myfx-stat">
        <span class="label">日々</span>
        <span class="value" id="myfx-daily">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">月々</span>
        <span class="value" id="myfx-monthly">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">ドローダウン</span>
        <span class="value" id="myfx-drawdown">--</span>
      </div>
    </div>

    <!-- セクション3: 残高・エクイティ・最高・利益・金利 -->
    <div class="myfx-section">
      <div class="myfx-stat">
        <span class="label">残高</span>
        <span class="value" id="myfx-balance">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">エクイティ</span>
        <span class="value" id="myfx-equity">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">最高</span>
        <span class="value" id="myfx-highest">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">利益</span>
        <span class="value" id="myfx-profit">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">金利</span>
        <span class="value" id="myfx-interest">--</span>
      </div>
    </div>

    <!-- セクション4: 入金・出金 -->
    <div class="myfx-section">
      <div class="myfx-stat">
        <span class="label">入金</span>
        <span class="value" id="myfx-deposits">--</span>
      </div>
      <div class="myfx-stat">
        <span class="label">出金</span>
        <span class="value" id="myfx-withdrawals">--</span>
      </div>
    </div>

    <div class="myfx-verified">VERIFIED BY MYFXBOOK.COM</div>
  </div>

  <canvas id="myfxbookChart" style="display:none;"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(async function() {
  try {
    // サマリー表示
    const sumRes = await fetch('/data/myfxbook-summary.json');
    const sum = await sumRes.json();

    document.getElementById('myfx-name').textContent = 'てつFX';
    const cur = sum.currency || 'JPY';
    const sym = cur === 'JPY' ? '¥' : cur + ' ';

    // ヘルパー: パーセント表示 + 色付け
    function setPct(id, val) {
      const el = document.getElementById(id);
      if (!el) return;
      const n = parseFloat(val);
      el.textContent = (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
      el.classList.add(n >= 0 ? 'positive' : 'negative');
    }

    // ヘルパー: 金額表示 + 色付け
    function setMoney(id, val, colored) {
      const el = document.getElementById(id);
      if (!el) return;
      const n = parseFloat(val);
      el.textContent = sym + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (colored) el.classList.add(n >= 0 ? 'positive' : 'negative');
    }

    // セクション1: 増加
    setPct('myfx-growth', sum.growth);
    setPct('myfx-abs-gain', sum.absGain);

    // セクション2: 日々・月々・DD
    setPct('myfx-daily', sum.daily);
    setPct('myfx-monthly', sum.monthly);
    const ddEl = document.getElementById('myfx-drawdown');
    ddEl.textContent = parseFloat(sum.drawdown).toFixed(2) + '%';
    ddEl.classList.add('negative');

    // セクション3: 残高・エクイティ・最高・利益・金利
    setMoney('myfx-balance', sum.balance, false);
    const eqEl = document.getElementById('myfx-equity');
    const eqPct = parseFloat(sum.equityPercent || 0).toFixed(2);
    const eqVal = parseFloat(sum.equity || 0);
    eqEl.textContent = `(${eqPct}%) ${sym}${eqVal.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

    setMoney('myfx-highest', sum.highest, false);
    setMoney('myfx-profit', sum.profit, true);
    setMoney('myfx-interest', sum.interest, true);

    // セクション4: デポジット・引き出し
    setMoney('myfx-deposits', sum.deposits, false);
    setMoney('myfx-withdrawals', sum.withdrawals, false);

  } catch(e) {
    console.error('サマリー読み込みエラー:', e);
  }

  try {
    // グラフ描画（get-data-daily API の balance をそのまま使用）
    const [balRes, histRes2] = await Promise.all([
      fetch('/data/myfxbook-daily-balance.json'),
      fetch('/data/myfxbook-history.json')
    ]);
    const rawBalData = await balRes.json();
    const history    = await histRes2.json();
    const currency   = 'JPY';

    // 入れ子配列をフラット化
    const balData = rawBalData.map(d => Array.isArray(d) ? d[0] : d).filter(Boolean);
    if (!balData.length) return;

    // --- 入金・出金マーカー用（取引履歴から） ---
    const depositDates  = new Map();
    const withdrawDates = new Map();
    if (history && history.length > 0) {
      history.forEach(t => {
        const action = (t.action || '').toLowerCase();
        const profit = parseFloat(t.profit) || 0;
        const dateStr = (t.closeTime || '').split(' ')[0];
        if (!dateStr) return;
        if (action === 'deposit') {
          depositDates.set(dateStr, (depositDates.get(dateStr) || 0) + profit);
        } else if (action === 'withdrawal') {
          withdrawDates.set(dateStr, (withdrawDates.get(dateStr) || 0) + Math.abs(profit));
        }
      });
    }

    const labels        = balData.map(d => d.date);
    const balanceValues = balData.map(d => Math.round(parseFloat(d.balance)));

    if (labels.length === 0) return;

    // --- 入金・出金マーカー（該当日のみ値、他はnull） ---
    const depositData  = labels.map(d => depositDates.has(d) ? 0 : null);
    const withdrawData = labels.map(d => withdrawDates.has(d) ? 0 : null);

    // === チャート描画 ===
    const datasets = [
      {
        type: 'line',
        label: '口座残高',
        data: balanceValues,
        borderColor: '#7cb342',
        backgroundColor: 'rgba(124, 179, 66, 0.15)',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.4,
        order: 2
      }
    ];

    datasets.push({
      type: 'line',
      label: '入金',
      data: depositData,
      showLine: false,
      pointRadius: 7,
      pointBackgroundColor: '#e67e22',
      pointBorderColor: '#e67e22',
      order: 0
    });

    datasets.push({
      type: 'line',
      label: '出金',
      data: withdrawData,
      showLine: false,
      pointRadius: 7,
      pointBackgroundColor: '#3498db',
      pointBorderColor: '#3498db',
      order: 0
    });

    const chartEl = document.getElementById('myfxbookChart');
    chartEl.style.display = '';
    const ctx = chartEl.getContext('2d');
    new Chart(ctx, {
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: {
          mode: 'index',
          intersect: false
        },
        plugins: {
          legend: {
            display: true,
            labels: { usePointStyle: true }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: {
              label: function(ctx) {
                const lbl = ctx.dataset.label;
                if (lbl === '口座残高') {
                  return ` 口座残高: ${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '--'} ${currency}`;
                }
                if (lbl === 'エクイティ') {
                  return ` エクイティ: ${ctx.parsed.y != null ? ctx.parsed.y.toLocaleString() : '--'} ${currency}`;
                }
                if (lbl === '入金') {
                  const dateKey = labels[ctx.dataIndex];
                  const amount = depositDates.get(dateKey);
                  return ` 入金: ${amount != null ? amount.toLocaleString() : '--'} ${currency}`;
                }
                if (lbl === '出金') {
                  const dateKey = labels[ctx.dataIndex];
                  const amount = withdrawDates.get(dateKey);
                  return ` 出金: ${amount != null ? amount.toLocaleString() : '--'} ${currency}`;
                }
                return null;
              }
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 10 } },
          y: {
            beginAtZero: true,
            ticks: { callback: val => val.toLocaleString() }
          }
        }
      }
    });
  } catch(e) {
    console.error('グラフ読み込みエラー:', e);
  }
})();
</script>
